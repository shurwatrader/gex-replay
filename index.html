<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GEX Replay</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span id="title">GEX Replay</span>
    </div>
    <div class="topbar-selects">
      <label>Series
        <select id="seriesSelect"></select>
      </label>
      <label>Date
        <input type="date" id="datePick" />
      </label>
      <label class="range-end">to
        <input type="date" id="datePickEnd" />
      </label>
      <div class="btn-row">
        <button id="analyzeBtn" class="analyze-btn" title="Analyze the selected date range with the squeeze framework">🧠 Analyze</button>
        <button id="evolveBtn" class="analyze-btn analyze-btn-exp" title="EXPERIMENTAL — session-evolution analytics (untested, pending live-data validation)">📈 Evolution</button>
      </div>
    </div>
    <div class="topmeta">
      <div class="meta-block">
        <span class="meta-label">TRADING DAY</span>
        <span id="tradingDay" class="meta-val td">—</span>
      </div>
      <div class="meta-block">
        <span class="meta-label">SNAPSHOT (ET)</span>
        <span id="snapET" class="meta-val">—</span>
        <span class="meta-sub"><span id="clkCT">—</span> CT · <span id="clkPT">—</span> PT</span>
      </div>
      <div class="meta-block gex0-block" id="gex0Block" hidden title="GEX0 proxy — experimental approximation of the net-GEX zero level over the visible board (not a true gamma flip)">
        <span class="meta-label">Γ GEX0 <span class="beta-tag">beta</span></span>
        <span id="gex0Val" class="meta-val gex0">—</span>
        <span class="meta-sub" id="gex0Dist">—</span>
      </div>
    </div>
  </header>

  <main class="grid-wrap">
    <div id="gridScroll" class="grid-scroll">
      <table id="grid" class="grid"></table>
    </div>
    <div id="empty" class="empty" hidden>No data loaded.</div>
  </main>

  <div class="legend">
    <span id="legMin" class="leg-val">—</span>
    <div class="legend-bar"></div>
    <span id="legZero" class="leg-val leg-zero">0</span>
    <div class="legend-bar legend-bar-pos"></div>
    <span id="legMax" class="leg-val">—</span>
  </div>

  <footer class="controls">
    <div class="ctl-buttons">
      <button id="firstBtn" title="First frame (Home)">⏮</button>
      <button id="prevBtn" title="Previous frame (←)">◀</button>
      <button id="playBtn" class="play" title="Play / Pause (Space)">▶</button>
      <button id="nextBtn" title="Next frame (→)">▶</button>
      <button id="lastBtn" title="Last frame (End)">⏭</button>
    </div>
    <div class="ctl-timeline">
      <input id="scrubber" class="scrubber" type="range" min="0" max="0" value="0" step="1" />
      <span id="frameLabel" class="frame-label">— / —</span>
    </div>
    <div class="ctl-right">
      <label class="speed">Step
        <select id="stepSelect">
          <option value="1" selected>2m</option>
          <option value="5">10m</option>
          <option value="15">30m</option>
          <option value="30">1h</option>
        </select>
      </label>
      <label class="speed">Speed
        <select id="speedSelect">
          <option value="0.5" selected>0.5×</option>
          <option value="1">1×</option>
          <option value="2">2×</option>
        </select>
      </label>
      <label class="movers-toggle" title="Outline the biggest changes since the previous frame">
        <input id="moversToggle" type="checkbox" checked /> Movers
      </label>
    </div>
  </footer>

  <div id="analysisModal" class="analysis-modal" hidden>
    <div class="analysis-panel">
      <div class="analysis-head">
        <span>🧠 GEX Squeeze Read <small id="analysisRange"></small></span>
        <button id="analysisClose" class="analysis-close" title="Close">×</button>
      </div>
      <div id="analysisBody" class="analysis-body"></div>
      <div class="analysis-foot">Structural read from the replay data · premium/flow not included · not financial advice</div>
    </div>
  </div>
</div>
<script src="scoring.js"></script>
<script src="app.js"></script>
</body>
</html>
